<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxo - Admin</title>
    <link rel="shortcut icon" href="images/barco2.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/default.css" />
    <link rel="stylesheet" href="css/admin.css" />
</head>

<body>
    <div class="page">
        <header>
            <div id="title">
                <img src="images/barco1.png" alt="ícone de barco" />
                <div class="headtitle">
                    <h1>Luxo</h1>
                    <h2>Aluguel de iates</h2>
                </div>
            </div>
        </header>

        <main>
            <div class="pagtitle">
                <div class="bgtitle"></div>
                <h2>Acesso restrito</h2>
            </div>

            <form id="loginForm">
                <div class="entry">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required />
                </div>

                <div class="entry">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required />
                </div>

                <p id="msgErro" style="color: red; display: none;"></p>

                <div class="buttons">
                    <button type="submit" class="button">Entrar</button>
                </div>
            </form>
        </main>
    </div>

    <footer>
        <p>© 2023 por Luxo aluguel de iates</p>
    </footer>

    <script src="js/jquery-3.6.4.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        function inicializarLogin() {
            const emailInput = document.getElementById("email");
            const senhaInput = document.getElementById("senha");
            const loginForm = document.getElementById("loginForm");

            if (!emailInput || !senhaInput || !loginForm) {
                console.error("Formulário de login com elementos ausentes");
                return;
            }

            loginForm.addEventListener("submit", fazerLogin);
        }

        function mostrarErro(msg) {
            const msgErro = document.getElementById("msgErro");
            msgErro.textContent = msg;
            msgErro.style.display = "block";
        }

        function fazerLogin(e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const senha = document.getElementById("senha").value;

            if (!email || !senha) {
                mostrarErro("Preencha e-mail e senha");
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(email)) {
                mostrarErro("E-mail inválido");
                return;
            }

            const autorizado = validarUsuario({ email, senha }) === true;

            if (!autorizado) {
                mostrarErro("E-mail e Senha inválidos");
                return;
            }

            sessionStorage.setItem("autorizado", "true");
            window.location.href = "mensagens.html";
        }

        inicializarLogin();
    </script>
</body>

</html>
